<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>ARDOISE — Restaurant Gastronomique</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --ink:#0a0b0c; --cream:#f0ebe0; --cream2:#c8bfad; --r:18px; }

    html, body { width:100%; height:100%; background:var(--ink); overflow:hidden; }
    body { padding:10px; }

    .hero { display:flex; width:calc(100vw - 20px); height:calc(100vh - 20px); height:calc(100dvh - 20px); gap:10px; }

    /* LEFT */
    .hero__left { position:relative; flex:1; border-radius:var(--r); overflow:hidden; }
    .hero__left__bg {
      position:absolute; inset:0;
      background-image:url('https://images.pexels.com/photos/5865244/pexels-photo-5865244.jpeg?auto=compress&cs=tinysrgb&w=1920');
      background-size:cover; background-position:center 40%;
      transform:scale(1.02); transition:transform 8s ease;
    }
    .hero__left:hover .hero__left__bg { transform:scale(1.06); }
    .hero__left__overlay {
      position:absolute; inset:0;
      background:
        linear-gradient(to top,   rgba(0,0,0,.78) 0%, rgba(0,0,0,.1) 50%, transparent 100%),
        linear-gradient(to right, rgba(0,0,0,.35) 0%, transparent 60%),
        linear-gradient(to bottom,rgba(0,0,0,.4)  0%, transparent 30%);
    }

    /* NAV PILL */
    .nav {
      position:absolute; top:20px; left:20px; z-index:10;
      display:inline-flex; align-items:center; gap:4px;
      padding:9px 12px 9px 16px;
      background:rgba(8,7,6,.58); backdrop-filter:blur(22px); -webkit-backdrop-filter:blur(22px);
      border:1px solid rgba(240,235,224,.1); border-radius:999px;
      box-shadow:0 4px 24px rgba(0,0,0,.35);
      animation:fadeDown .7s .05s cubic-bezier(.16,1,.3,1) both;
    }
    .nav__burger { display:flex; flex-direction:column; gap:4.5px; cursor:pointer; padding:4px 6px; border-radius:999px; transition:background .2s; }
    .nav__burger:hover { background:rgba(240,235,224,.08); }
    .nav__burger span { display:block; width:18px; height:1.5px; background:var(--cream); }
    .nav__logo { font-family:'Cormorant Garamond',serif; font-weight:400; font-size:19px; letter-spacing:.26em; color:var(--cream); text-transform:uppercase; padding:0 4px 0 6px; text-decoration:none; }
    .nav__sep { width:1px; height:15px; background:rgba(240,235,224,.14); margin:0 6px; flex-shrink:0; }
    .nav__links { display:flex; align-items:center; gap:2px; list-style:none; }
    .nav__links a { display:block; font-family:'Jost',sans-serif; font-weight:300; font-size:10.5px; letter-spacing:.18em; text-transform:uppercase; color:rgba(240,235,224,.58); text-decoration:none; padding:7px 13px; border-radius:999px; transition:background .2s, color .2s; white-space:nowrap; }
    .nav__links a:hover { color:var(--cream); background:rgba(240,235,224,.1); }
    .nav__links a.active { color:var(--cream); background:rgba(240,235,224,.14); }

    /* HEADLINE */
    .hero__headline { position:absolute; bottom:48px; left:36px; z-index:10; line-height:.88; }
    .hero__headline h1 { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:clamp(62px,8.5vw,108px); letter-spacing:-.01em; text-transform:uppercase; color:var(--cream); display:block; }
    .hero__headline h1:first-child { animation:headlineFade 2.2s 0.6s ease both; }
    .hero__headline h1:last-child  { animation:headlineFade 2.2s 1.1s ease both; }
    @keyframes headlineFade { from{opacity:0} to{opacity:1} }

    /* SOCIAL */
    .hero__social { position:absolute; bottom:52px; right:36px; z-index:10; display:flex; gap:18px; align-items:center; animation:fadeUp .7s .35s cubic-bezier(.16,1,.3,1) both; }
    .hero__social a { color:rgba(240,235,224,.45); transition:color .2s; text-decoration:none; display:flex; }
    .hero__social a:hover { color:var(--cream); }
    .hero__social svg { width:15px; height:15px; fill:currentColor; }

    /* RIGHT STRIP */
    .hero__right { width:min(27vw,350px); display:flex; flex-direction:column; flex-shrink:0; gap:10px; animation:revealR .85s .1s cubic-bezier(.16,1,.3,1) both; }

    /* PANELS */
    .panel { position:relative; flex:1; border-radius:var(--r); overflow:hidden; cursor:pointer; background:var(--ink); display:block; text-decoration:none; }
    .panel__photo { position:absolute; inset:0; background-size:cover; background-position:center; transition:transform .7s cubic-bezier(.25,.46,.45,.94); }
    .panel:hover .panel__photo { transform:scale(1.05); }
    .panel--menu    .panel__photo { background-image:url('https://images.pexels.com/photos/2403392/pexels-photo-2403392.jpeg?auto=compress&cs=tinysrgb&w=800'); background-position:center 30%; }
    .panel--resy    .panel__photo { background-image:url('https://images.pexels.com/photos/1850595/pexels-photo-1850595.jpeg?auto=compress&cs=tinysrgb&w=800'); background-position:center 20%; }
    .panel--resto   .panel__photo { background-image:url('https://images.pexels.com/photos/4577692/pexels-photo-4577692.jpeg?auto=compress&cs=tinysrgb&w=800'); background-position:center; }
    .panel__overlay { position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,.62) 0%, rgba(0,0,0,.05) 50%, transparent 100%); }
    .panel__label { position:absolute; bottom:16px; right:18px; z-index:5; display:flex; align-items:center; gap:8px; font-family:'Jost',sans-serif; font-weight:300; font-size:10px; letter-spacing:.22em; text-transform:uppercase; color:var(--cream2); transition:color .2s, gap .25s; }
    .panel:hover .panel__label { color:var(--cream); gap:13px; }
    .panel__label .arr { font-size:13px; transition:transform .25s; }
    .panel:hover .panel__label .arr { transform:translateX(3px); }

    /* ANIMATIONS */
    .hero__left { animation:revealL .85s cubic-bezier(.16,1,.3,1) both; }
    @keyframes revealL  { from{opacity:0;transform:scale(.97)} to{opacity:1;transform:scale(1)} }
    @keyframes revealR  { from{opacity:0;transform:translateX(16px)} to{opacity:1;transform:translateX(0)} }
    @keyframes fadeDown { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(22px)}  to{opacity:1;transform:translateY(0)} }

    /* ── RESPONSIVE ───────────────────────────────────────────── */
    @media (max-width: 900px) {
      .hero__right { width: min(32vw, 280px); }
      .hero__headline h1 { font-size: clamp(48px, 8vw, 80px); }
    }

    @media (max-width: 700px) {
      html, body { overflow: hidden; height: 100%; }
      body { padding: 8px; }
      .hero { flex-direction: column; width: calc(100vw - 16px); height: calc(100vh - 16px); height: calc(100dvh - 16px); gap: 8px; }
      .hero__left { flex: 7; min-height: 0; }
      .hero__right { flex: 3; min-height: 0; width: 100%; flex-direction: row; gap: 8px; }
      .panel__label { font-size: 9px; bottom: 10px; right: 12px; }
      .nav { padding: 8px 10px 8px 12px; gap: 2px; }
      .nav__logo { font-size: 16px; letter-spacing: .2em; }
      .nav__sep { margin: 0 4px; }
      .nav__links a { padding: 6px 8px; font-size: 9.5px; letter-spacing: .12em; }
      .hero__headline { bottom: 36px; left: 24px; }
      .hero__headline h1 { font-size: clamp(44px, 13vw, 68px); }
      .hero__social { bottom: 36px; right: 20px; gap: 14px; }
    }

    @media (max-width: 480px) {
      /* Nav: masquer les liens pour éviter le dépassement sur écrans étroits */
      .nav__sep,
      .nav__links { display: none; }
      .nav { padding: 8px 14px; gap: 4px; }
      .nav__logo { font-size: 15px; letter-spacing: .2em; }

      /* Panneaux droits */
      .hero__right { height: 100px; }
      .panel__label { font-size: 7px; letter-spacing: .04em; bottom: 8px; right: 8px; gap: 4px; }

      /* Headline + icônes sociales : séparer verticalement pour éviter le chevauchement */
      .hero__headline { bottom: 52px; left: 20px; }
      .hero__headline h1 { font-size: clamp(34px, 11vw, 50px); }
      .hero__social { bottom: 14px; right: 16px; gap: 12px; }
    }
  </style>
</head>
<body>
<section class="hero">

  <div class="hero__left">
    <div class="hero__left__bg"></div>
    <div class="hero__left__overlay"></div>

    <nav class="nav">
      <div class="nav__burger"><span></span><span></span><span></span></div>
      <a class="nav__logo" href="index.html">Ardoise</a>
      <div class="nav__sep"></div>
      <ul class="nav__links">
        <li><a href="menu.html">Menu</a></li>
        <li><a href="about.html">À propos</a></li>
        <li><a href="reservation.html">Réserver</a></li>
      </ul>
    </nav>

    <div class="hero__headline">
      <h1>Instinct</h1>
      <h1>Culinaire</h1>
    </div>

      <a href="#" aria-label="Twitter"><svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.259 5.63zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a>
    </div>
  </div>

  <div class="hero__right">
    <a class="panel panel--menu" href="menu.html">
      <div class="panel__photo"></div>
      <div class="panel__overlay"></div>
      <div class="panel__label">Menu <span class="arr">→</span></div>
    </a>
    <a class="panel panel--resy" href="reservation.html">
      <div class="panel__photo"></div>
      <div class="panel__overlay"></div>
      <div class="panel__label">Réservation <span class="arr">→</span></div>
    </a>
    <a class="panel panel--resto" href="about.html">
      <div class="panel__photo"></div>
      <div class="panel__overlay"></div>
      <div class="panel__label">Notre restaurant <span class="arr">→</span></div>
    </a>
  </div>

</section>
</body>
</html>
